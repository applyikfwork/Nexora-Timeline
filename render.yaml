services:
  - type: web
    name: nexora-api
    runtime: node
    rootDir: artifacts/api-server
    buildCommand: pnpm install && node build.mjs
    startCommand: node dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PORT
        generateValue: false
